<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Select Product</legend>
                <label for="product-name" name="productName"></label>
                <select name="productName" id="product-name" required>
                    <option value="" disabled selected>Select a Product...</option>
                </select>
            </fieldset>
            <fieldset>
                <legend>Overall Rating</legend>
                <p>Rate the product from 1 to 5 stars</p>
                <div class="rating-group">
                <div class="rating-item">
                <input type="radio" id="rating-1" name="overallRating" value="1" required>
                <label for="rating-1">&star;</label>
                </div>
                
                <div class="rating-item">
                <input type="radio" id="rating-2" name="overallRating" value="2" required>
                <label for="rating-2">&star; &star;</label>
                </div>

                <div class="rating-item">
                <input type="radio" id="rating-3" name="overallRating" value="3" required>
                <label for="rating-3">&star; &star; &star;</label>
                </div>

                <div class="rating-item">
                <input type="radio" id="rating-4" name="overallRating" value="4" required>
                <label for="rating-4">&star; &star; &star; &star;</label>
                </div>

                <div class="rating-item">
                <input type="radio" id="rating-5" name="overallRating" value="5" required>
                <label for="rating-5">&star; &star; &star; &star; &star;</label>
                </div>
                </div>
            </fieldset>
            <fieldset>
                <legend>Date of Installation</legend>
                <label for="install-date"></label>
                <input type="date" id="install-date" name="installDate" required>
            </fieldset>
            <fieldset>
                <legend>Useful Features (Check all that apply)</legend>
                <div class="checkbox-group">
                <div class="checkbox-item">
                <input type="checkbox" id="feature-durability" name="usefulFeatures" value="durability">
                <label for="feature-durability">Durability</label>
                </div>

                <div class="checkbox-item">
                <input type="checkbox" id="feature-design" name="usefulFeatures" value="design">
                <label for="feature-design">Sleek Design</label>
                </div>

                <div class="checkbox-item">
                <input type="checkbox" id="feature-performance" name="usefulFeatures" value="performance">
                <label for="feature-performance">High Performance</label>
                </div>

                <div class="checkbox-item">
                <input type="checkbox" id="feature-ease" name="usefulFeatures" value="easeOfUse">
                <label for="feature-ease">Ease of Use</label>
                </div>
                </div>
            </fieldset>
            <fieldset>
                <label for="written-review">
                    Written Review <span class="optional">(Optional)</span>
                </label>
                <textarea name="writtenReview" id="written-review" rows="5" placeholder="Share your experience..."></textarea>

                <label for="user-name">
                    User Name <span class="optional">(Optional)</span>
                </label>
                <input type="text" id="user-name" name="userName" placeholder="Your Name">
            </fieldset>
            <input type="submit" value="Submit Review">
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> 🏕️ Nick Waechtler 🏕️ Utah</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
